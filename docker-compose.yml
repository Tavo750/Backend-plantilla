# =====================================================================
# Docker Compose - Tasf.B2B Backend (Con MySQL 8.4)
# =====================================================================

services:
  db:
    image: mysql:8.4
    container_name: tasfb2b-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - tasfb2b-net
    mem_limit: 512m
    mem_reservation: 256m

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tasfb2b-backend
    restart: unless-stopped
    profiles:
      - full
    depends_on:
      - db
    environment:
      # ── Perfil Spring ──────────────────────────────────────────────
      SPRING_PROFILES_ACTIVE: prod

      # ── Conexión a DB ──────────────────────────────────────────────
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

      # ── JWT ────────────────────────────────────────────────────────
      JWT_SECRET: ${JWT_SECRET:-clave-secreta-super-segura-para-jwt-debe-tener-al-menos-256-bits-de-longitud-2024}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}

      # ── CORS ───────────────────────────────────────────────────────
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}

      # ── JVM: Limitar heap a 512 MB (crítico en VM de 2 GB) ─────────
      JAVA_OPTS: >-
        -Xms256m -Xmx512m -XX:MetaspaceSize=96m -XX:MaxMetaspaceSize=128m -XX:+UseG1GC -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -Djava.awt.headless=true

    ports:
      # Accesible desde cualquier interfaz de red (útil para Postman / desarrollo)
      - "0.0.0.0:8080:8080"
    volumes:
      - backend_logs:/app/logs
    networks:
      - tasfb2b-net
    mem_limit: 640m
    mem_reservation: 256m

networks:
  tasfb2b-net:
    driver: bridge

volumes:
  backend_logs:
    driver: local
    name: tasfb2b-backend-logs
  mysql_data:
    driver: local
    name: tasfb2b-mysql-data
