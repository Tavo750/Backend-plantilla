# =====================================================================
# Docker Compose - Entorno de desarrollo local
# =====================================================================
version: '3.9'

services:
  # =================================================================
  # Base de datos PostgreSQL
  # =================================================================
  postgres:
    image: postgres:16-alpine
    container_name: plantilla-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: baseEquipo7G
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: equipodp17g
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # =================================================================
  # Aplicación Spring Boot (opcional, para despliegue completo)
  # =================================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: plantilla-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "3000:3000"
    profiles:
      - full

volumes:
  postgres_data:
    driver: local
