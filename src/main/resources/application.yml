# =====================================================================
# Configuración de la Aplicación - Spring Boot
# Lee variables desde el archivo .env mediante spring-dotenv
# =====================================================================

server:
  port: ${SERVER_PORT:3000}
  servlet:
    context-path: /api

# =====================================================================
# Spring Data Source - PostgreSQL
# =====================================================================
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:plantilla_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Cache
  cache:
    type: simple

# =====================================================================
# JWT
# =====================================================================
jwt:
  secret: ${JWT_SECRET:clave-secreta-super-segura-para-jwt-debe-tener-al-menos-256-bits-de-longitud-2024}
  expiration: ${JWT_EXPIRATION:86400000}

# =====================================================================
# CORS
# =====================================================================
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# =====================================================================
# OpenAPI / Swagger
# =====================================================================
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# =====================================================================
# Logging
# =====================================================================
logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.plantilla.backend: DEBUG
    org.springframework.security: WARN
