# =====================================================================
# Perfil de PRODUCCIÓN - Tasf.B2B Backend
# Despliegue local en VM Ubuntu (sin cloud, sin AWS)
# =====================================================================

server:
  port: 8080
  servlet:
    context-path: /api
  # Ajustar tamaño de cola y threads para VM con recursos limitados
  tomcat:
    threads:
      max: 50
      min-spare: 5
    accept-count: 50
    connection-timeout: 20000

# =====================================================================
# Spring Data Source - MySQL 8.4 (contenedor local)
# El host "db" es el nombre del servicio en docker-compose.yml
# =====================================================================
spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:db}:${DB_PORT:3306}/${DB_NAME:baseEquipo7G}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8&useUnicode=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: com.mysql.cj.jdbc.Driver
    # HikariCP - pool mínimo para ahorrar memoria
    hikari:
      pool-name: TasfB2B-HikariPool
      minimum-idle: 2
      maximum-pool-size: 10
      idle-timeout: 300000
      connection-timeout: 20000
      leak-detection-threshold: 60000

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: validate          # En prod: nunca "create" ni "update"
    show-sql: false
    open-in-view: false           # Evita anti-patrón y ahorra recursos
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        # Estadísticas desactivadas en prod para ahorrar overhead
        generate_statistics: false

  # Cache simple en memoria (no Redis, ahorra RAM)
  cache:
    type: simple

  # Deshabilitar DevTools y carga de banner (ahorra RAM al arrancar)
  devtools:
    restart:
      enabled: false
  main:
    banner-mode: off

  # No buscar .env en producción (las vars vienen del docker-compose)
  config:
    import: ""

# =====================================================================
# JWT
# =====================================================================
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

# =====================================================================
# CORS - Permitir solo desde el proxy Nginx local
# =====================================================================
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost}

# =====================================================================
# OpenAPI / Swagger - Deshabilitado en producción
# =====================================================================
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# =====================================================================
# Logging - Reducido para ahorrar I/O en disco limitado
# =====================================================================
logging:
  level:
    root: WARN
    com.plantilla.backend: INFO
    org.springframework.security: WARN
    org.hibernate: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: /app/logs/tasf-b2b.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7            # Guardar solo 7 días de logs
      total-size-cap: 500MB

# =====================================================================
# Actuator - Solo health expuesto (sin info ni beans sensibles)
# =====================================================================
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
